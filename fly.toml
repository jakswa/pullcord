# Pullcord — Real-time MARTA Bus Tracker
# https://pullcord.dev or bus.marta.io

app = "pullcord"
primary_region = "atl"

[build]

[env]
  PORT = "4200"
  DATABASE_URL = "/data/marta.db"
  CORDS_DATABASE_URL = "/data/cords.db"

[http_service]
  internal_port = 4200
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "pullcord_data"
  destination = "/data"
